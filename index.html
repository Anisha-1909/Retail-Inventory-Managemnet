 
<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>📦 Inventory Management System</title>
    <link rel="stylesheet" href="style.css">
 
</head>
<body>

<h1>📦 Inventory Management System</h1>

<div class="form">
    <input type="text" id="name" placeholder="Product Name"> 
    <input type="number" id="price" placeholder="Price">
    <input type="number" id="qty" placeholder="Quantity">
 
    <select id="category">
        <option disabled selected>Select category</option>
        <option value="Food">Food</option>  
        <option value="Electronics">Electronics</option>    
        <option value="Clothing">Clothing</option>  
        <option value="Home & Kitchen"> Home & Kitchen</option>   
        <option value="Furniture">Furniture</option> 
        <option value="Books">Books</option>
        <option value="stationery">stationery</option>
        <option value="Footwear">Footwear</option>
        <option value="Beauty & Personalcare">Beauty & Personalcare</option>
    </select>

    <button onclick="addProduct()">Add Product</button>
    <button onclick="clearAll()" style="background: #dbb589">
        Clear All
      </button>
      <input
        type="text"
        id="search"
        placeholder="Search..."
        onkeyup="searchProduct()"
      />

      <select id="sort" onchange="sortProducts()">
        <option value="">Sort By</option>
        <option value="name">Name(A-Z)</option>
        <option value="price">Price(Low-high)</option>
        <option value="category">Category(A-Z)</option>
      </select>
    </div>
    <div class="stats">
      <p>Total Items: <span id="totalItems">0</span></p>
      <p>Low Stock: <span id="lowStock">0</span></p>
      <p>In-stock:<span id="inStock">0</span></p>
      <p>Inventory Value:<span id="inventoryvalues">0</span></p>
    </div>
    
</div>


<input type="text" id="search" placeholder="Search..." onkeyup="searchProduct()">

<div class="stats">
    <p>Total Items: <span id="totalItems">0</span></p>
    <p>Low Stock: <span id="lowStock">0</span></p>
</div>

<table>
    <thead>
        <tr>
            <th>S.no</th>
            <th>Product Name</th>
            <th>Price</th>
            <th>Qty</th>
            <th>Total</th>
            <th>Category</th>
            <th>Status</th>
            <th>Actions</th>
           
        </tr>
    </thead>
    <tbody id="table"></tbody>
</table>

<script src="script.js"></script>
</body>
</html>
